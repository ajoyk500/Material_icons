name: Build from ZIP

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 📦 Unzip Project
        run: |
          unzip aimlinepro-4.1.2.zip -d project
          ls project

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📥 Install SDK + NDK
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0" \
                     "ndk;25.2.9519653" \
                     "cmake;3.22.1"

      - name: 🔧 Build APK
        run: |
          cd project
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/app/build/outputs/apk/debug/*.apk
